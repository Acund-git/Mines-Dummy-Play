    <style>
        :root {

            --text-muted: #b1bad3; --border: #2f4553;

        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: 800; font-size: 13px; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: 0.2s; }
        .btn-green { background: var(--accent); color: #000; }
        .btn-outline { background: #2f4553; color: white; border: 1px solid var(--border); }
        .btn-red { background: var(--mine-color); color: white; }
        button:disabled { opacity: 0.3 !important; cursor: not-allowed !important; filter: grayscale(1); }
        .bet-tools { display: flex; gap: 5px; margin-top: 5px; }
        .btn-tool { flex: 1; padding: 8px; background: var(--border); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-topup { width: auto; min-width: 80px; padding: 6px 12px; background: var(--border); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        .stat-item span { display: block; font-size: 10px; color: var(--text-muted); }

</head>
